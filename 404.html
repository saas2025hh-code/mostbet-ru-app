<!DOCTYPE html>
<html lang="ru-RU">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Страница недоступна | Mostbet Россия</title>
<meta name="robots" content="noindex, follow"/>
<style>
:root{--bg-1:#0d1117;--bg-2:#121820;--bg-3:#1a1f2e;--card:#1e2438;--border:#2a3050;--text:#e8eaf0;--text-mute:#7a86a0;--gold:#f0c040;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-1);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:640px;margin:0 auto;padding:48px 24px;text-align:center}
.code{font-size:96px;font-weight:900;color:var(--gold);font-family:Arial Black,sans-serif;letter-spacing:-4px;line-height:1;margin-bottom:16px;opacity:.85}
h1{font-size:28px;font-weight:700;margin-bottom:16px;color:var(--text)}
.prose p{color:var(--text-mute);font-size:16px;line-height:1.7;margin-bottom:28px}
.btn{display:inline-block;padding:13px 32px;border-radius:var(--r);font-weight:600;font-size:15px;text-decoration:none;transition:background .2s}
.btn-primary{background:var(--gold);color:#000}.btn-primary:hover{background:#ffd050}
.divider{width:60px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 28px;opacity:.5}
</style>
</head>
<body>
<main class="container prose">
<div class="code">404</div>
<div class="divider"></div>
<h1>Страница недоступна</h1>
<p>Запрашиваемая страница отсутствует в этом руководстве. Вы можете вернуться на главную, чтобы продолжить с приложением, казино, акциями, входом, регистрацией или поддержкой.</p>
<a class="btn btn-primary" href="./">На главную</a>
</main>
</body>
</html>
